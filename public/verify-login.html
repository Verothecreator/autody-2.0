<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autody | Verify Sign In</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <header class="site-header">
    <nav class="nav container" aria-label="Main navigation">
      <a href="index.html" class="brand" aria-label="Autody home">
        <img src="Autody-Logo.png" alt="" class="brand-mark" />
        <span>Autody</span>
      </a>
    </nav>
  </header>

  <main class="auth-shell auth-shell-single">
    <section class="auth-panel">
      <div class="auth-copy">
        <p class="eyebrow">Email code</p>
        <h1>Check your email</h1>
        <p id="verify-login-copy">We sent a 6-digit code to your email. Enter it below to continue. The code expires in 5 minutes.</p>
      </div>

      <form class="auth-form" id="verify-login-form">
        <label>
          <input class="auth-code-input" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="000000" required />
        </label>
        <p class="auth-error" id="verify-login-error" role="alert" hidden></p>
        <p class="auth-success" id="verify-login-success" role="status" hidden></p>
        <button class="btn btn-large" id="verify-login-button" type="submit">Confirm</button>
        <button class="auth-link-button auth-resend-button" id="resend-login-code-button" type="button">Resend code</button>
      </form>
    </section>
  </main>

  <script src="verify-login.js"></script>
</body>
</html>
