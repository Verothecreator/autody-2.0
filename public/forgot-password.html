<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autody | Reset Password</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <header class="site-header">
    <nav class="nav container" aria-label="Main navigation">
      <a href="index.html" class="brand" aria-label="Autody home">
        <img src="Autody-Logo.png" alt="" class="brand-mark" />
        <span>Autody</span>
      </a>
    </nav>
  </header>

  <main class="auth-shell auth-shell-single password-reset-shell">
    <section class="auth-panel password-reset-panel">
      <div class="auth-copy">
        <p class="eyebrow">Account security</p>
        <h1>Reset your password</h1>
        <p>Enter the email linked to your Autody account to receive a secure password reset link.</p>
      </div>

      <div class="auth-form">
        <form id="password-reset-request-form">
          <label>
            Email
            <input name="email" id="password-reset-email" type="email" autocomplete="username" required />
          </label>
          <p class="auth-error" id="password-reset-request-message" role="alert" hidden></p>
          <button class="btn btn-large" id="password-reset-request-button" type="submit">Send Reset Link</button>
        </form>

        <form id="password-reset-confirm-form" hidden>
          <label>
            New password
            <span class="auth-password-field">
              <input name="newPassword" type="password" autocomplete="new-password" required />
              <button class="auth-password-toggle" type="button" data-toggle-password aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </span>
          </label>
          <label>
            Confirm new password
            <span class="auth-password-field">
              <input name="confirmPassword" type="password" autocomplete="new-password" required />
              <button class="auth-password-toggle" type="button" data-toggle-password aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </span>
          </label>
          <p class="auth-error" id="password-reset-confirm-message" role="alert" hidden></p>
          <button class="btn btn-large" id="password-reset-confirm-button" type="submit">Reset Password</button>
        </form>
      </div>
    </section>
  </main>

  <script src="auth-password.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
