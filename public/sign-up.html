<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autody | Create Account</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <header class="site-header">
    <nav class="nav container" aria-label="Main navigation">
      <a href="index.html" class="brand" aria-label="Autody home">
        <img src="Autody-Logo.png" alt="" class="brand-mark" />
        <span>Autody</span>
      </a>
      <div class="nav-actions">
        <a href="sign-in.html" class="btn btn-ghost">Sign In</a>
      </div>
    </nav>
  </header>

  <main class="auth-shell auth-shell-single">
    <section class="auth-panel">
      <div class="auth-copy">
        <p class="eyebrow">Create account</p>
        <h1>Open your Autody account</h1>
        <p>Create your account, open the live workspace, and keep demo mode ready while the platform grows into full funding and verification.</p>
      </div>

      <form class="auth-form auth-form-wide" id="sign-up-form">
        <div class="auth-form-grid">
          <label>
            First name
            <input name="firstName" type="text" autocomplete="given-name" placeholder="First name" required />
          </label>
          <label>
            Last name
            <input name="lastName" type="text" autocomplete="family-name" placeholder="Last name" required />
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label class="auth-phone-label">
            Phone number
            <span class="auth-phone-input">
              <select name="countryCode" id="country-code" aria-label="Country calling code" required></select>
              <input name="phone" type="tel" autocomplete="tel-national" placeholder="555 000 0000" required />
            </span>
          </label>
          <label>
            Country of residence
            <input name="country" type="text" autocomplete="country-name" placeholder="United States" required />
          </label>
          <label>
            Date of birth
            <input name="dateOfBirth" type="date" autocomplete="bday" required />
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="new-password" required />
          </label>
          <label>
            Confirm password
            <input name="confirmPassword" type="password" autocomplete="new-password" required />
          </label>
        </div>

        <label class="auth-check">
          <input name="acceptedAccuracy" type="checkbox" required />
          <span>I confirm this information is accurate and can be used for Autody account verification.</span>
        </label>
        <label class="auth-check">
          <input name="acceptedServiceTerms" type="checkbox" required />
          <span>I have read the <a href="terms.html" target="_blank" rel="noopener">Terms of Service</a>.</span>
        </label>

        <p class="auth-error" id="sign-up-error" role="alert" hidden></p>
        <p class="auth-success" id="sign-up-success" role="status" hidden></p>
        <button class="btn btn-large" id="sign-up-button" type="submit">Create Account</button>
        <a href="sign-in.html" class="auth-inline-link">Already have an account?</a>
      </form>
    </section>
  </main>

  <script src="sign-up.js"></script>
</body>
</html>
