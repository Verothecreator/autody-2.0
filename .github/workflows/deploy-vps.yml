name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Update Autody VPS
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST || vars.VPS_HOST || '162.213.249.146' }}
          username: ${{ secrets.VPS_USER || vars.VPS_USER || 'root' }}
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR || vars.VPS_APP_DIR || '/var/www/autody-2.0' }}"
            APP_NAME="${{ secrets.PM2_APP_NAME || vars.PM2_APP_NAME || 'autody' }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ -z "$APP_DIR" ]; then
              echo "Missing VPS_APP_DIR GitHub secret."
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Autody checkout was not found at $APP_DIR."
              echo "Creating a fresh checkout for this VPS."
              mkdir -p "$APP_DIR"

              if [ -n "$(ls -A "$APP_DIR" 2>/dev/null)" ]; then
                echo "$APP_DIR exists but is not an empty git checkout."
                echo "Move the old files out or set VPS_APP_DIR to a clean folder, then rerun this workflow."
                exit 1
              fi

              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git pull --ff-only origin main
            npm install --omit=dev --no-package-lock

            set_env_value() {
              key="$1"
              value="$2"
              touch .env
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                printf '\n%s=%s\n' "$key" "$value" >> .env
              fi
            }

            set_env_value APP_BASE_URL https://autodytraded.com
            set_env_value AUTODY_BUILD_ID ${{ github.sha }}
            set_env_value DEPOSIT_MONITOR_ENABLED true
            set_env_value DEPOSIT_MONITOR_INTERVAL_MS 60000
            set_env_value DEPOSIT_MONITOR_JITTER_MS 5000
            set_env_value DEPOSIT_MONITOR_ADDRESS_LIMIT 500
            set_env_value DEPOSIT_PROVIDER_MIN_INTERVAL_MS 1200
            set_env_value DEPOSIT_PROVIDER_COOLDOWN_MS 60000
            set_env_value DEPOSIT_PROVIDER_MAX_COOLDOWN_MS 600000
            set_env_value DEPOSIT_MIN_CONFIRMATIONS 3
            set_env_value DEPOSIT_CONFIRMED_EMAIL_DELAY_MS 90000
            set_env_value DEPOSIT_ACCOUNT_TX_LIMIT 100
            set_env_value DEPOSIT_EVM_SCAN_OVERLAP_BLOCKS 5000
            set_env_value DEPOSIT_EVM_LOG_LOOKBACK_BLOCKS 10000
            set_env_value DEPOSIT_EVM_SCAN_CURSOR_VERSION v2
            set_env_value DEPOSIT_MIN_AUTO_CREDIT_USD 0.01
            set_env_value DEPOSIT_MIN_AUTO_STABLECOIN_CREDIT 0.01
            set_env_value DEPOSIT_DUST_CLEANUP_LIMIT 250
            set_env_value DEPOSIT_EVM_TOPIC_ADDRESS_BATCH_SIZE 80
            set_env_value DEPOSIT_REST_RETRY_ATTEMPTS 2
            set_env_value DEPOSIT_RPC_TIMEOUT_MS 10000
            set_env_value DEPOSIT_RPC_RETRY_ATTEMPTS 1
            set_env_value DEPOSIT_BLOCKSCOUT_EMPTY_FALLBACK false

            if command -v pm2 >/dev/null 2>&1; then
              if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^autody.service'; then
                systemctl stop autody || true
                systemctl disable autody || true
              fi

              if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
                pm2 restart "$APP_NAME" --update-env
              else
                pm2 start server.js --name "$APP_NAME"
              fi
              pm2 save
            elif command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^autody.service'; then
              systemctl restart autody
            else
              echo "No PM2 app or autody.service found on the VPS."
              echo "Install PM2 or create a systemd service, then rerun this workflow."
              exit 1
            fi

            PORT_VALUE="$(grep '^PORT=' .env | tail -n 1 | cut -d= -f2-)"
            PORT_VALUE="${PORT_VALUE:-3000}"
            BUILD_INFO=""
            for attempt in 1 2 3 4 5; do
              BUILD_INFO="$(curl -fsS --max-time 15 "http://127.0.0.1:${PORT_VALUE}/api/build-info" 2>/dev/null || true)"
              if printf '%s' "$BUILD_INFO" | grep -q '"buildId":"${{ github.sha }}"'; then
                break
              fi
              sleep 5
            done

            if ! printf '%s' "$BUILD_INFO" | grep -q '"buildId":"${{ github.sha }}"'; then
              echo "Deployment verification failed: the local Autody process is not serving commit ${{ github.sha }}."
              printf '%s\n' "$BUILD_INFO"
              exit 1
            fi

            for marker in '"databaseConfigured":true' '"emailConfigured":true' '"depositMonitorEnabled":true'; do
              if ! printf '%s' "$BUILD_INFO" | grep -q "$marker"; then
                echo "Deployment verification failed: missing runtime marker $marker."
                printf '%s\n' "$BUILD_INFO"
                exit 1
              fi
            done

            PUBLIC_BUILD_INFO="$(curl -fsS --max-time 20 https://autodytraded.com/api/build-info 2>/dev/null || true)"
            if ! printf '%s' "$PUBLIC_BUILD_INFO" | grep -q '"buildId":"${{ github.sha }}"'; then
              echo "Deployment verification failed: autodytraded.com is not serving commit ${{ github.sha }}."
              printf '%s\n' "$PUBLIC_BUILD_INFO"
              exit 1
            fi
