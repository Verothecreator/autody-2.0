name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-server:
    name: Patch deposit scanner source
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Patch EVM token scanner
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("server.js")
          text = path.read_text()
          original = text

          text = text.replace("    return detected >= 0;\n", "    return detected;\n", 1)

          old = '''    let logs = [];
    try {
        logs = await provider.getLogs({
            address: contract.address,
            fromBlock: window.fromBlock,
            toBlock: window.toBlock,
            topics: [ERC20_TRANSFER_TOPIC, null, addressTopics]
        });
    } catch (err) {
        if (config.blockscoutApiUrl) {
            try {
                await scanEvmTokenDepositsFromBlockscout(client, config, contract, rows, summary, window, latestBlock);
                if (!window.manualOverride) await saveDepositScanState(client, window);
                return;
            } catch (fallbackErr) {
                summary.errors.push({
                    network,
                    asset: assetSymbol,
                    scanner: "blockscout-token",
                    error: fallbackErr.message || String(fallbackErr)
                });
            }
        }
        throw err;
    }

    for (const log of logs) {
        const parsed = ERC20_TRANSFER_INTERFACE.parseLog(log);
        const topicAddress = evmAddressTopic(parsed.args.to);
        const matchingRows = rowsByTopic.get(topicAddress) || [];
        const amountText = ethers.formatUnits(parsed.args.value, contract.decimals);
        const amount = numberValue(amountText, 0);
        if (amount <= 0) continue;
        const confirmations = Math.max(0, latestBlock - Number(log.blockNumber || 0) + 1);
        for (const row of matchingRows) {
            const result = await creditDetectedDepositWithTransaction(client, row, {
                amount,
                txHash: log.transactionHash,
                logIndex: Number(log.index ?? log.logIndex ?? 0),
                blockNumber: Number(log.blockNumber || 0),
                confirmations,
                metadata: {
                    scanner: "evm-token",
                    contract: contract.address,
                    tokenDecimals: contract.decimals,
                    from: parsed.args.from,
                    to: parsed.args.to
                }
            });
            addDepositScanResult(summary, result);
        }
    }

    if (!window.manualOverride) await saveDepositScanState(client, window);
'''

          new = '''    const logsByKey = new Map();
    try {
        const topicBatches = chunkItems(addressTopics, DEPOSIT_EVM_TOPIC_ADDRESS_BATCH_SIZE);
        for (const topicBatch of topicBatches) {
            const batchLogs = await provider.getLogs({
                address: contract.address,
                fromBlock: window.fromBlock,
                toBlock: window.toBlock,
                topics: [ERC20_TRANSFER_TOPIC, null, topicBatch]
            });
            for (const log of batchLogs) {
                const logKey = `${String(log.transactionHash || "").toLowerCase()}:${Number(log.index ?? log.logIndex ?? 0)}`;
                logsByKey.set(logKey, log);
            }
        }
    } catch (err) {
        if (config.blockscoutApiUrl) {
            try {
                await scanEvmTokenDepositsFromBlockscout(client, config, contract, rows, summary, window, latestBlock);
                if (!window.manualOverride) await saveDepositScanState(client, window);
                return;
            } catch (fallbackErr) {
                summary.errors.push({
                    network,
                    asset: assetSymbol,
                    scanner: "blockscout-token",
                    error: fallbackErr.message || String(fallbackErr)
                });
            }
        }
        throw err;
    }

    for (const log of logsByKey.values()) {
        const parsed = ERC20_TRANSFER_INTERFACE.parseLog(log);
        const topicAddress = evmAddressTopic(parsed.args.to);
        const matchingRows = rowsByTopic.get(topicAddress) || [];
        const amountText = ethers.formatUnits(parsed.args.value, contract.decimals);
        const amount = numberValue(amountText, 0);
        if (amount <= 0) continue;
        const confirmations = Math.max(0, latestBlock - Number(log.blockNumber || 0) + 1);
        for (const row of matchingRows) {
            const result = await creditDetectedDepositWithTransaction(client, row, {
                amount,
                txHash: log.transactionHash,
                logIndex: Number(log.index ?? log.logIndex ?? 0),
                blockNumber: Number(log.blockNumber || 0),
                confirmations,
                metadata: {
                    scanner: "evm-token",
                    contract: contract.address,
                    tokenDecimals: contract.decimals,
                    from: parsed.args.from,
                    to: parsed.args.to
                }
            });
            addDepositScanResult(summary, result);
        }
    }

    if (config.blockscoutApiUrl) {
        try {
            await scanEvmTokenDepositsFromBlockscout(client, config, contract, rows, summary, window, latestBlock);
        } catch (fallbackErr) {
            summary.errors.push({
                network,
                asset: assetSymbol,
                scanner: "blockscout-token",
                error: fallbackErr.message || String(fallbackErr)
            });
        }
    }

    if (!window.manualOverride) await saveDepositScanState(client, window);
'''

          if old in text:
              text = text.replace(old, new, 1)
          elif "const logsByKey = new Map();" in text:
              print("Scanner already patched.")
          else:
              raise SystemExit("Expected EVM scanner block was not found.")

          if text != original:
              path.write_text(text)
              print("Patched server.js")
          else:
              print("No server.js changes needed")
          PY

      - name: Validate server syntax
        run: node --check server.js

      - name: Commit scanner fix
        run: |
          if git diff --quiet -- server.js; then
            echo "No scanner changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js
          git commit -m "Harden EVM deposit token scanning"
          git push

  deploy:
    name: Update Autody VPS
    needs: patch-server
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST || vars.VPS_HOST || '162.213.249.146' }}
          username: ${{ secrets.VPS_USER || vars.VPS_USER || 'root' }}
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR || vars.VPS_APP_DIR || '/var/www/autody-2.0' }}"
            APP_NAME="${{ secrets.PM2_APP_NAME || vars.PM2_APP_NAME || 'autody' }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ -z "$APP_DIR" ]; then
              echo "Missing VPS_APP_DIR GitHub secret."
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Autody checkout was not found at $APP_DIR."
              echo "Creating a fresh checkout for this VPS."
              mkdir -p "$APP_DIR"

              if [ -n "$(ls -A "$APP_DIR" 2>/dev/null)" ]; then
                echo "$APP_DIR exists but is not an empty git checkout."
                echo "Move the old files out or set VPS_APP_DIR to a clean folder, then rerun this workflow."
                exit 1
              fi

              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git pull --ff-only origin main
            npm install --omit=dev --no-package-lock

            set_env_value() {
              key="$1"
              value="$2"
              touch .env
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                printf '\n%s=%s\n' "$key" "$value" >> .env
              fi
            }

            set_env_value APP_BASE_URL https://autodytraded.com
            set_env_value DEPOSIT_MONITOR_ENABLED true
            set_env_value DEPOSIT_MONITOR_ADDRESS_LIMIT 500
            set_env_value DEPOSIT_ACCOUNT_TX_LIMIT 100
            set_env_value DEPOSIT_EVM_SCAN_OVERLAP_BLOCKS 5000
            set_env_value DEPOSIT_MIN_AUTO_CREDIT_USD 0.01
            set_env_value DEPOSIT_MIN_AUTO_STABLECOIN_CREDIT 0.01
            set_env_value DEPOSIT_DUST_CLEANUP_LIMIT 250
            set_env_value DEPOSIT_EVM_TOPIC_ADDRESS_BATCH_SIZE 80

            if command -v pm2 >/dev/null 2>&1; then
              if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^autody.service'; then
                systemctl stop autody || true
                systemctl disable autody || true
              fi

              if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
                pm2 restart "$APP_NAME" --update-env
              else
                pm2 start server.js --name "$APP_NAME"
              fi
              pm2 save
            elif command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^autody.service'; then
              systemctl restart autody
            else
              echo "No PM2 app or autody.service found on the VPS."
              echo "Install PM2 or create a systemd service, then rerun this workflow."
              exit 1
            fi
